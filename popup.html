<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Garmin 运动统计</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body data-column-count="1">
    <main class="app-shell" aria-busy="true">
      <header class="topbar">
        <div class="brand-block">
          <img class="brand-icon" src="icons/icon32.png" alt="">
          <div><h1>运动数据统计</h1><p id="connectionStatus">Garmin Connect China</p></div>
        </div>
        <div class="topbar-actions">
          <button id="refreshButton" class="icon-button" type="button" aria-label="刷新数据" title="刷新数据"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12a9 9 0 0 0-15.1-6.6L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 15.1 6.6L21 16"/><path d="M16 16h5v5"/></svg></button>
        </div>
      </header>

      <nav class="period-tabs" id="periodControl" aria-label="统计周期">
        <button type="button" data-period="week" aria-pressed="false">周</button>
        <button type="button" data-period="month" aria-pressed="true">月</button>
      </nav>

      <section class="context-row" aria-label="统计筛选">
        <div class="sport-select" id="sportControl" role="group" aria-label="运动类型">
          <button type="button" data-sport="running" aria-pressed="true">跑步</button>
          <button type="button" data-sport="cycling" aria-pressed="false">骑行</button>
        </div>
        <p id="periodTitle" class="range-label"></p>
      </section>

      <section id="loadingView" class="loading-view" role="status" aria-label="正在加载" aria-live="polite">
        <div class="loading-card"><div class="skeleton skeleton-total"></div><div class="skeleton skeleton-chart"></div><div class="skeleton skeleton-metrics"></div></div>
      </section>

      <section id="errorView" class="state-view" role="alert" aria-live="assertive" tabindex="-1" hidden>
        <div class="state-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 9v4"/><path d="M12 17h.01"/><path d="M10.3 3.7 2.6 17a2 2 0 0 0 1.7 3h15.4a2 2 0 0 0 1.7-3L13.7 3.7a2 2 0 0 0-3.4 0Z"/></svg></div>
        <h2 id="errorTitle">暂时无法读取数据</h2><p id="errorMessage"></p>
        <div class="state-actions"><button id="retryButton" class="command-button" type="button">重试</button><a id="loginButton" class="command-button secondary" href="https://connect.garmin.cn/app/activities" target="_blank" rel="noreferrer" hidden>打开 Garmin</a></div>
      </section>

      <div id="dataView" hidden>
        <section id="statsGrid" class="stats-grid" aria-label="已选运动统计"></section>
      </div>
    </main>
    <script src="visual-fixture.js"></script>
    <script type="module" src="popup.js"></script>
  </body>
</html>
